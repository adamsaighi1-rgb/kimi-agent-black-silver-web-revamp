services:
  postgres:
    image: postgres:16-alpine
    container_name: robins-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strapi}
      POSTGRES_USER: ${POSTGRES_USER:-strapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strapi}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  strapi:
    build:
      context: ./cms
      dockerfile: Dockerfile
    container_name: robins-strapi
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      HOST: 0.0.0.0
      PORT: ${STRAPI_PORT:-1337}
      APP_KEYS: ${APP_KEYS:-toBeModified1,toBeModified2,toBeModified3,toBeModified4}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-tobemodified}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-tobemodified}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-tobemodified}
      JWT_SECRET: ${JWT_SECRET:-tobemodified}
      SEED_ON_BOOTSTRAP: ${SEED_ON_BOOTSTRAP:-true}
      STRAPI_DEFAULT_LOCALE: ${STRAPI_DEFAULT_LOCALE:-en}
      REELLY_IMPORT_ON_BOOTSTRAP: ${REELLY_IMPORT_ON_BOOTSTRAP:-false}
      REELLY_AUTH_TOKEN: ${REELLY_AUTH_TOKEN:-}
      REELLY_EMAIL: ${REELLY_EMAIL:-}
      REELLY_PASSWORD: ${REELLY_PASSWORD:-}
      REELLY_LIMIT: ${REELLY_LIMIT:-50}
      REELLY_LOGIN_URL: ${REELLY_LOGIN_URL:-https://api.reelly.io/api:sk5LT7jx/auth/login0}
      REELLY_LIST_URL: ${REELLY_LIST_URL:-https://api-reelly.up.railway.app/api/internal/projects?limit=50}
      REELLY_DETAIL_URL: ${REELLY_DETAIL_URL:-https://api-reelly.up.railway.app/api/internal/projects/{id}}
      REELLY_MEDIA_URL: ${REELLY_MEDIA_URL:-https://api-reelly.up.railway.app/api/internal/projects/{id}/media}
      REELLY_PAYMENT_PLAN_URL: ${REELLY_PAYMENT_PLAN_URL:-https://api-reelly.up.railway.app/api/internal/projects/{id}/payment_plan}
      REELLY_UNITS_URL: ${REELLY_UNITS_URL:-https://api-reelly.up.railway.app/api/internal/projects/{id}/units}
      REELLY_ORIGIN: ${REELLY_ORIGIN:-https://find.reelly.io}
      REELLY_PAUSE_MS: ${REELLY_PAUSE_MS:-150}
      REELLY_REQUEST_TIMEOUT_MS: ${REELLY_REQUEST_TIMEOUT_MS:-30000}
      REELLY_DOWNLOAD_TIMEOUT_MS: ${REELLY_DOWNLOAD_TIMEOUT_MS:-90000}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-strapi}
      DATABASE_USERNAME: ${POSTGRES_USER:-strapi}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-strapi}
      DATABASE_SSL: 'false'
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '${STRAPI_PORT:-1337}:1337'
    volumes:
      - ./cms:/opt/app
      - /opt/app/node_modules
      - cms_uploads:/opt/app/public/uploads
    command: npm run develop

volumes:
  postgres_data:
  cms_uploads:


